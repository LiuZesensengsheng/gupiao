name: Deploy Top20 Site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/**
    paths:
      - "site_public/**"
      - ".github/workflows/deploy-top20-site.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site_public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
